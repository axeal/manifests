apiVersion: v1
kind: Service
metadata:
  name: home-assistant-headless
  namespace: home-assistant
spec:
  clusterIP: None
  ports:
  - port: 8123
    targetPort: 8123
    name: http
  selector:
    app: home-assistant
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  type: ClusterIP
  selector:
    app: home-assistant
  ports:
  - port: 8123
    targetPort: 8123
    protocol: TCP
    name: http
